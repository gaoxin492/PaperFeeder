name: Apply Feedback Queue

permissions:
  contents: read

on:
  # Periodically merge pending D1 feedback into the D1-backed semantic seeds state.
  # Default: every 3 days at 16:30 UTC (00:30 China time next day). Edit the cron if you want a different cadence/time zone.
  schedule:
    - cron: "30 16 */3 * *"
  workflow_dispatch:
    inputs:
      run_id:
        description: "Optional run_id filter (empty = apply all pending)"
        required: false
        default: ""
      manifest_file:
        description: "Optional manifest file for run mapping (falls back to artifacts dir scan)"
        required: false
        default: ""
      dry_run:
        description: "Dry run (no seed write)"
        required: false
        default: "true"
        type: boolean

jobs:
  apply-queue:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Apply queue to seeds
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          D1_DATABASE_ID: ${{ secrets.D1_DATABASE_ID }}
          SEMANTIC_STATE_BACKEND: d1
          EVENT_NAME: ${{ github.event_name }}
          INPUT_MANIFEST: ${{ github.event.inputs.manifest_file || '' }}
          INPUT_RUN_ID: ${{ github.event.inputs.run_id || '' }}
          INPUT_DRY: ${{ github.event.inputs.dry_run }}
        run: |
          # Scheduled runs: always apply for real (writes seeds + updates D1 event rows).
          # workflow_dispatch: respect dry_run (default true in UI).
          if [ "$EVENT_NAME" = "schedule" ]; then
            DRY="false"
            MANIFEST="$INPUT_MANIFEST"
            RUN_ID="$INPUT_RUN_ID"
          else
            # Default dry run when unset (defensive); GitHub usually passes true/false for boolean inputs.
            if [ -z "$INPUT_DRY" ] || [ "$INPUT_DRY" = "true" ] || [ "$INPUT_DRY" = "True" ]; then
              DRY="true"
            else
              DRY="false"
            fi
            MANIFEST="$INPUT_MANIFEST"
            RUN_ID="$INPUT_RUN_ID"
          fi
          BASE_CMD=(python -m paperfeeder.cli.apply_feedback --from-d1 --manifest-file "${MANIFEST}" --manifests-dir artifacts)
          if [ -n "$RUN_ID" ]; then
            BASE_CMD+=(--run-id "$RUN_ID")
          fi
          if [ "$DRY" = "true" ]; then
            "${BASE_CMD[@]}" --dry-run
          else
            "${BASE_CMD[@]}"
          fi


